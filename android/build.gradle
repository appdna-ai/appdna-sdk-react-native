buildscript {
    // SPEC-070-B P0: inherit the CONSUMER's Kotlin. Pinning 1.9.22 here would force every host onto
    // our toolchain; `ai.appdna:sdk-android` publishes a precompiled AAR whose 1.9.22 metadata is
    // forward-compatible, so a newer host Kotlin consumes it fine.
    ext.getExtOrDefault = { name, fallback ->
        rootProject.ext.has(name) ? rootProject.ext.get(name) : fallback
    }

    ext.kotlin_version = getExtOrDefault("kotlinVersion", "1.9.22")
    // Kotlin 2.0 (RN >= 0.77) moved the Compose compiler out of the standalone
    // `kotlinCompilerExtensionVersion` mechanism into the `org.jetbrains.kotlin.plugin.compose`
    // Gradle plugin. We support BOTH: the extension path for 1.9.x, the plugin path for 2.0+.
    ext.isKotlin2 = kotlin_version.tokenize('.')[0].toInteger() >= 2

    repositories {
        google()
        mavenCentral()
    }

    dependencies {
        classpath "com.android.tools.build:gradle:8.2.1"
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
        // The Compose Compiler Gradle plugin ships versioned with Kotlin from 2.0 on.
        if (isKotlin2) {
            classpath "org.jetbrains.kotlin:compose-compiler-gradle-plugin:$kotlin_version"
        }
    }
}

apply plugin: "com.android.library"
apply plugin: "org.jetbrains.kotlin.android"
// Kotlin 2.0+ Compose is enabled by applying this plugin (replaces kotlinCompilerExtensionVersion).
if (isKotlin2) {
    apply plugin: "org.jetbrains.kotlin.plugin.compose"
}

// New Architecture only (D-c). The React Gradle plugin generates the TurboModule/Fabric specs this
// module implements; without it, `NativeAppdnaModuleSpec` does not exist.
apply plugin: "com.facebook.react"

def getExtOrIntegerDefault = { name, fallback ->
    rootProject.ext.has(name) ? rootProject.ext.get(name).toInteger() : fallback
}

android {
    namespace "com.appdna.rn"
    compileSdk getExtOrIntegerDefault("compileSdkVersion", 34)

    defaultConfig {
        minSdk getExtOrIntegerDefault("minSdkVersion", 24)
        targetSdk getExtOrIntegerDefault("targetSdkVersion", 34)
        consumerProguardFiles "consumer-rules.pro"
    }

    buildFeatures {
        // SPEC-070-B P4: AppdnaScreenSlotView hosts a ComposeView and invokes the native
        // @Composable `AppDNAScreenSlot(name)`, so this module compiles Composable-calling code
        // and needs the Compose compiler.
        buildConfig true
        compose true
    }
    // Kotlin 1.9.x: the standalone Compose compiler extension. 1.5.14 (Kotlin 1.9.24) mirrors
    // sdk-android; since this wrapper inherits the CONSUMER's Kotlin, suppress the exact-version check
    // so one extension serves 1.9.22–1.9.25. Kotlin 2.0+: neither block runs — the compose Gradle
    // plugin applied above owns the compiler, and the extension/suppress path would be REJECTED.
    if (!isKotlin2) {
        composeOptions {
            kotlinCompilerExtensionVersion '1.5.14'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
        if (!isKotlin2) {
            freeCompilerArgs += [
                "-P",
                "plugin:androidx.compose.compiler.plugins.kotlin:suppressKotlinVersionCompatibilityCheck=$kotlin_version"
            ]
        }
    }

    sourceSets {
        main {
            java.srcDirs += ["src/main/java"]
        }
    }
}

repositories {
    // SPEC-070-B P0, mirroring the Flutter plugin's on-branch override: resolve a LOCALLY published
    // `ai.appdna:sdk-android` when APPDNA_ANDROID_SDK_PATH is set, so an unreleased native can be
    // compile-verified before it is published. Unset in CI/publish → mavenCentral only.
    //
    // NOTE: a consumer app's settings.gradle usually owns dependency resolution
    // (RepositoriesMode.FAIL_ON_PROJECT_REPOS), in which case THIS block is ignored and the
    // override must live in the app's settings/root build file. That is why the RN example carries
    // its own copy — see example/android/build.gradle.
    if (System.getenv("APPDNA_ANDROID_SDK_PATH")) {
        mavenLocal()
    }
    google()
    mavenCentral()
}

android.testOptions {
    unitTests {
        // `AppdnaBridge` speaks org.json, and `AppdnaVetoDecoder` decodes what it produces. The stock
        // android.jar stubs throw on every method, so without this the tests would fail for a reason
        // that has nothing to do with the code under test.
        returnDefaultValues = false
        includeAndroidResources = true
    }
}

dependencies {
    implementation "com.facebook.react:react-android"
    implementation "org.jetbrains.kotlin:kotlin-stdlib:$kotlin_version"

    // SPEC-070-B AC-11/AC-33: `parseOptions`, the JSON bridge and the veto decoder are native-only.
    // A jest test cannot see a Kotlin `?: 3600`, and neither can a Dart one.
    testImplementation "junit:junit:4.13.2"
    testImplementation "org.robolectric:robolectric:4.11.1"
    testImplementation "org.jetbrains.kotlinx:kotlinx-coroutines-test:1.7.3"
    // AC-11: `parseOptions` is an instance method on AppdnaModule, whose super
    // (NativeAppdnaModuleSpec → ReactContextBaseJavaModule) needs a ReactApplicationContext — abstract
    // since RN 0.76. The init block never touches it, so a Mockito mock (constructed via Objenesis,
    // no super ctor run) is a sufficient stand-in to reach parseOptions.
    testImplementation "org.mockito:mockito-core:5.11.0"

    // SPEC-070-B D-v: pinned to the native this wrapper wraps. A bare Gradle version is a required
    // MINIMUM, not a lock — Gradle happily resolves something newer — so `check:version-lockstep`
    // (AC-34) asserts this coordinate equals the shipped Android version rather than assuming it.
    implementation "ai.appdna:sdk-android:1.0.42"

    // SPEC-070-B P4: Compose runtime/UI + the ViewTree owners (SlotViewTreeOwner) needed to host a
    // ComposeView outside a ComponentActivity. sdk-android pulls Compose in via `implementation`
    // (not exported), so the wrapper declares its own aligned copies — mirrors the Flutter plugin.
    def composeBom = platform('androidx.compose:compose-bom:2024.02.02')
    implementation composeBom
    implementation 'androidx.compose.ui:ui'
    implementation 'androidx.lifecycle:lifecycle-runtime-ktx:2.7.0'
    implementation 'androidx.lifecycle:lifecycle-viewmodel-ktx:2.7.0'
    implementation 'androidx.savedstate:savedstate-ktx:1.2.1'
}
